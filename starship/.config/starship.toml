[fill]
symbol = "Â·"
style = "dimmed bright-black"

[character]
format = "$symbol "
success_symbol = "[âťŻ](bold green)"
error_symbol = "[âťŻ](bold red)"
vimcmd_symbol = "[âť®](italic dimmed green)"

[username]
style_user = "bright-yellow bold"
style_root = "red bold"
format = "[$user]($style) "
disabled = false

[sudo]
format = "[ ]($style)"
style = "bold red"
disabled = false

[directory]
home_symbol = "~"
read_only = " "
truncation_length = 3
style = "bg:#4c566a fg:#88c0d0 bold"
format = "[$path](bg:#4c566a fg:#88c0d0 bold)"

[git_branch]
symbol = " "
style = "bg:#5e81ac fg:#ebcb8b bold"
format = "[ $symbol$branch](bg:#5e81ac fg:#ebcb8b bold)"

[git_status]
style = "bg:#5e81ac fg:#bf616a bold"
format = "[$all_status$ahead_behind ](bg:#5e81ac fg:#bf616a bold)"
staged     = " "
modified   = " "
untracked  = " "
deleted    = " "
renamed    = " "
conflicted = " "
stashed    = " "
ahead      = "â‡ˇ"
behind     = "â‡Ł"
diverged   = "â‡•"

[git_metrics]
format = "[ $added $deleted ](bg:#5e81ac fg:#a3be8c bold)"
disabled = false

[time]
disabled = false
time_format = "%I:%M:%S %p"
style = "bg:#3b4252 fg:#d8dee9 bold"
format = "[$time](bg:#3b4252 fg:#d8dee9 bold)"

[cmd_duration]
format = "[ $duration](italic yellow)"

[jobs]
symbol = " "
format = "[$symbol$number]($style)"
style = "blue"

[battery]
format = "[ $percentage]($style)"
[[battery.display]]
threshold = 20
style = "red bold"

[nodejs]
symbol = " "
format = "[ $symbol($version)](bold green)"

[python]
symbol = " "
